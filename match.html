
<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find my adviser | foundli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root {
      --teal-deep:#0d3d42; --teal:#18727d; --teal-ink:#071e22;
      --teal-light:#f4f9f9; --teal-soft:#ddf0f1; --teal-muted:#9ecdd2;
      --sage:#5b7263; --sage-light:#eef4ee;
      --blush:#c49183; --blush-light:#f5ece9;
      --warm-grey:#d1cdca; --border:#d0e8ea;
      --ink:#0d3d42; --muted:#5b7263; --white:#ffffff;
      --font:'Nunito Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--teal-deep);color:var(--white);min-height:100vh;-webkit-font-smoothing:antialiased}
    nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid rgba(255,255,255,0.08);background:var(--teal-deep)}
    .nav-logo{font-weight:800;font-size:20px;color:var(--white);letter-spacing:-0.5px;text-decoration:none}
    .nav-back{font-size:13px;color:var(--teal-muted);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--font);font-weight:600}
    .nav-steps{font-size:12px;color:var(--teal-muted);font-weight:600}
    .progress-wrap{padding:0 32px;background:var(--teal-deep)}
    .progress-track{height:3px;background:rgba(255,255,255,0.12);border-radius:2px;margin:16px 0}
    .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal-muted),var(--blush));transition:width 0.5s ease}
    .main{min-height:calc(100vh - 80px);display:flex;align-items:flex-start;justify-content:center;padding:48px 20px 80px}
    .card{width:100%;max-width:600px;animation:fadeUp 0.4s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
    .q-number{font-size:11px;font-weight:700;color:var(--blush);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:12px}
    .q-title{font-size:clamp(22px,4vw,32px);font-weight:800;color:var(--white);line-height:1.2;letter-spacing:-0.5px;margin-bottom:8px}
    .q-sub{font-size:14px;color:var(--teal-muted);font-weight:400;line-height:1.65;margin-bottom:32px}
    .options{display:grid;gap:10px}
    .opt{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s;text-align:left;font-family:var(--font);color:rgba(255,255,255,0.85)}
    .opt:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);transform:translateY(-1px)}
    .opt.selected{border-color:var(--blush);background:rgba(196,145,131,0.15);color:var(--white)}
    .opt-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
    .opt.selected .opt-icon{background:rgba(196,145,131,0.2)}
    .opt-content{flex:1}
    .opt-label{font-size:14px;font-weight:600;line-height:1.4}
    .opt-desc{font-size:12px;color:var(--teal-muted);margin-top:3px;line-height:1.5}
    .opt.selected .opt-desc{color:rgba(255,255,255,0.65)}
    .opt-check{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.2s}
    .opt.selected .opt-check{background:var(--blush);border-color:var(--blush)}
    .opt-check-inner{width:8px;height:8px;border-radius:50%;background:var(--white);opacity:0;transition:opacity 0.2s}
    .opt.selected .opt-check-inner{opacity:1}
    .input-wrap{position:relative}
    .location-input{width:100%;padding:16px 18px 16px 48px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--white);font-size:15px;font-family:var(--font);font-weight:500;outline:none;transition:border-color 0.2s}
    .location-input::placeholder{color:rgba(255,255,255,0.3)}
    .location-input:focus{border-color:var(--blush)}
    .location-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--teal-muted);font-size:18px}
    .remote-toggle{display:flex;align-items:center;gap:10px;margin-top:14px;cursor:pointer;font-size:13px;color:var(--teal-muted);font-weight:600}
    .toggle-box{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.12);position:relative;transition:background 0.2s;flex-shrink:0}
    .toggle-box.on{background:var(--blush)}
    .toggle-knob{width:18px;height:18px;border-radius:50%;background:var(--white);position:absolute;top:3px;left:3px;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
    .toggle-box.on .toggle-knob{transform:translateX(20px)}
    .amount-opt{padding:14px 18px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:space-between;font-family:var(--font)}
    .amount-opt:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.07)}
    .amount-opt.selected{border-color:var(--blush);background:rgba(196,145,131,0.15)}
    .amount-label{font-size:15px;font-weight:700;color:var(--white)}
    .amount-sub{font-size:12px;color:var(--teal-muted);margin-top:2px}
    .amount-pip{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);flex-shrink:0;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
    .amount-opt.selected .amount-pip{background:var(--blush);border-color:var(--blush)}
    .amount-opt.selected .amount-pip::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--white)}
    .nav-btns{display:flex;gap:12px;margin-top:36px;justify-content:space-between;align-items:center}
    .btn-next{font-family:var(--font);font-size:15px;font-weight:800;background:var(--blush);color:var(--white);padding:15px 36px;border-radius:10px;border:none;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
    .btn-next:hover:not(:disabled){opacity:0.9;transform:translateY(-1px)}
    .btn-next:disabled{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.25);cursor:not-allowed}
    .btn-prev{font-family:var(--font);font-size:13px;font-weight:600;background:none;color:var(--teal-muted);border:none;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color 0.2s;padding:0}
    .btn-prev:hover{color:var(--white)}
    .matching-screen{text-align:center;padding:80px 20px;width:100%;max-width:500px}
    .spinner{width:56px;height:56px;border:3px solid rgba(255,255,255,0.1);border-top:3px solid var(--blush);border-radius:50%;margin:0 auto 28px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .matching-title{font-size:26px;font-weight:800;color:var(--white);margin-bottom:10px;letter-spacing:-0.5px}
    .matching-steps{margin-top:28px;display:flex;flex-direction:column;gap:8px;max-width:320px;margin-left:auto;margin-right:auto}
    .matching-step{font-size:13px;color:var(--teal-muted);padding:10px 16px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;transition:all 0.4s}
    .matching-step.done{color:var(--white);border-color:rgba(196,145,131,0.3);background:rgba(196,145,131,0.1)}
    .results-page{background:var(--teal-light);min-height:100vh}
    .results-header{background:var(--teal-deep);padding:40px 32px 52px;text-align:center}
    .results-badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;background:rgba(196,145,131,0.18);color:#e8b9ab;padding:5px 14px;border-radius:20px;margin-bottom:16px;border:1px solid rgba(196,145,131,0.28)}
    .results-title{font-size:clamp(26px,4vw,38px);font-weight:800;color:var(--white);letter-spacing:-1px;margin-bottom:8px}
    .results-sub{font-size:14px;color:var(--teal-muted)}
    .profile-summary{max-width:760px;margin:0 auto;padding:28px 32px}
    .profile-card{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:22px 24px;margin-bottom:8px}
    .profile-label{font-size:10px;font-weight:700;color:var(--blush);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
    .profile-tags{display:flex;flex-wrap:wrap;gap:8px}
    .profile-tag{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink);background:var(--teal-light);padding:5px 12px;border-radius:20px;border:1px solid var(--border)}
    .advisers-wrap{max-width:760px;margin:0 auto;padding:0 32px 60px}
    .advisers-title{font-size:11px;font-weight:700;color:var(--blush);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
    .adviser-card{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:24px;margin-bottom:14px;transition:all 0.22s;box-shadow:0 1px 4px rgba(13,61,66,0.04)}
    .adviser-card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 8px 32px rgba(13,61,66,0.1)}
    .adviser-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px}
    .adviser-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--teal-soft),var(--teal-muted));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--teal-deep);flex-shrink:0;font-family:var(--font)}
    .adviser-info{flex:1}
    .adviser-name{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:3px;letter-spacing:-0.3px}
    .adviser-firm{font-size:13px;color:var(--muted);margin-bottom:6px}
    .adviser-badges{display:flex;gap:6px;flex-wrap:wrap}
    .adviser-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
    .badge-fca{background:var(--teal-soft);color:var(--teal)}
    .badge-ind{background:var(--sage-light);color:var(--sage)}
    .badge-src{background:var(--blush-light);color:var(--blush)}
    .match-score-wrap{text-align:right;flex-shrink:0}
    .match-score{font-size:28px;font-weight:800;color:var(--teal);letter-spacing:-1px}
    .match-score-label{font-size:10px;color:var(--muted);font-weight:600}
    .why-match{background:var(--teal-light);border-radius:8px;padding:12px 16px;margin-bottom:16px;border-left:3px solid var(--teal)}
    .why-match-label{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
    .why-match-text{font-size:12px;color:var(--muted);line-height:1.65}
    .adviser-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
    .meta-label{font-size:10px;font-weight:700;color:var(--warm-grey);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
    .meta-value{font-size:13px;font-weight:600;color:var(--ink)}
    .adviser-specialisms{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
    .specialism-tag{font-size:11px;color:var(--muted);background:var(--teal-light);padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-weight:500}
    .adviser-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn-connect{flex:1;font-family:var(--font);font-size:13px;font-weight:800;background:var(--teal);color:var(--white);padding:13px 24px;border-radius:9px;border:none;cursor:pointer;text-decoration:none;text-align:center;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px}
    .btn-connect:hover{background:var(--teal-deep);transform:translateY(-1px)}
    .btn-connect.blush{background:var(--blush)}
    .btn-connect.blush:hover{background:#b07d6d}
    .btn-profile{font-family:var(--font);font-size:13px;font-weight:600;background:transparent;color:var(--teal);padding:13px 20px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:7px;transition:all 0.2s;white-space:nowrap}
    .btn-profile:hover{border-color:var(--teal);background:var(--teal-light)}
    .source-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:12px}
    .source-unbiased{background:#e8eef8;color:#003A9B}
    .source-vouchedfor{background:#e8f4ef;color:#0a6640}
    .disclaimer{max-width:760px;margin:0 auto;padding:0 32px 40px;font-size:11px;color:var(--muted);line-height:1.7}
    .disclaimer a{color:var(--teal);text-decoration:none;font-weight:600}
    @media(max-width:640px){
      nav{padding:14px 16px}
      .progress-wrap{padding:0 16px}
      .main{padding:32px 16px 60px}
      .adviser-meta{grid-template-columns:1fr 1fr}
      .profile-summary{padding:16px}
      .advisers-wrap{padding:0 16px 40px}
      .results-header{padding:32px 16px 44px}
    }
  </style>
</head>
<body>

<nav id="main-nav">
  <button class="nav-back" id="back-btn" onclick="goBack()" style="visibility:hidden">
    <i class="ti ti-arrow-left"></i> Back
  </button>
  <a href="/" class="nav-logo">foundli</a>
  <span class="nav-steps" id="step-counter">1 of 7</span>
</nav>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:14%"></div>
  </div>
</div>

<div id="questionnaire">
  <div class="main">
    <div class="card" id="question-card"></div>
  </div>
</div>

<div id="matching-screen" style="display:none" class="main" style="justify-content:center">
  <div class="matching-screen">
    <div style="font-size:22px;font-weight:800;color:var(--white);letter-spacing:-0.5px;margin-bottom:32px">foundli</div>
    <div class="spinner"></div>
    <h2 class="matching-title">Finding your match...</h2>
    <p style="font-size:13px;color:var(--teal-muted)">Analysing your answers across verified advisers</p>
    <div class="matching-steps">
      <div class="matching-step" id="ms1"><i class="ti ti-adjustments-horizontal"></i> Reading your profile...</div>
      <div class="matching-step" id="ms2"><i class="ti ti-shield-check"></i> Checking FCA-verified advisers...</div>
      <div class="matching-step" id="ms3"><i class="ti ti-map-pin"></i> Finding advisers near you...</div>
      <div class="matching-step" id="ms4"><i class="ti ti-heart"></i> Building your match...</div>
    </div>
  </div>
</div>

<div id="results-page" style="display:none" class="results-page"></div>

<script>
// ══ QUESTIONS ════════════════════════════════════════════════════════════════

var QUESTIONS = [
  {
    id: 'need',
    number: 'Question 1 of 7',
    title: "What's brought you here today?",
    sub: "Choose the option that feels closest to your situation.",
    type: 'single',

    ]

  {
    id: 'priority',

    title: "What matters most to you right now?",

    type: 'single',
    options: []
  },
  {
    id: 'feeling',
    number: 'Question 3 of 7',
    title: "How do you feel about your finances right now?",
    sub: "Be honest — there's no wrong answer. It just helps us find someone who gets your situation.",
    type: 'single',
    options: [
      { value: 'worried',     label: 'Worried',     desc: "I feel behind where I should be",                icon: '😟' },
      { value: 'overwhelmed', label: 'Overwhelmed', desc: "I don't really know where to start",             icon: '😕' },

      { value: 'new_family',      label: "I've had a baby or growing family",           icon: '👶' },

  {

  {

    title: "So we can match you with advisers who specialise in situations like yours, what's the approximate value of what you'd like advice on?",

    type: 'amount',
    options: [
      { value: 'under50k',   label: 'Under £50,000',          sub: 'Getting started' },
      { value: '50_150k',    label: '£50,000 – £150,000',     sub: 'Building wealth' },
      { value: '150_500k',   label: '£150,000 – £500,000',    sub: 'Established savings' },
      { value: '500k_1m',    label: '£500,000 – £1 million',  sub: 'Significant assets' },

  {
    id: 'meeting',
    number: 'Question 7 of 7',

    options: [

      { value: 'video',     label: 'Video call',   desc: "Online from wherever suits you",       icon: '💻' },

      { value: 'any',       label: 'Happy with any', desc: "I'm flexible — whatever's easiest", icon: '✅' }
    ]
  }
];

var PRIORITY_OPTIONS = {
  retirement: [
    { value: 'enough_to_retire',   label: "Making sure I have enough to retire on",  icon: '🎯' },
    { value: 'pension_value',      label: "Understanding what my pension is worth",   icon: '📊' },

  invest: [

    { value: 'isa_options',        label: "Choosing the right ISA or account",        icon: '🏦' },
    { value: 'risk_comfort',       label: "Investing without too much risk",          icon: '🛡️' },

  mortgage: [

    { value: 'remortgage',         label: "Getting a better deal on my mortgage",     icon: '🔄' },
    { value: 'buy_to_let',         label: "Buying a property to let out",             icon: '🏘️' },

  inheritance: [

    { value: 'estate_planning',    label: "Long-term estate planning",                icon: '🏛️' },
    { value: 'grief_support',      label: "Taking time — not ready to rush",          icon: '🌸' }
  ],

    { value: 'income_protect',     label: "Protecting my income if I cannot work",    icon: '☂️' },
    { value: 'will_power_atty',    label: "Writing a will or power of attorney",      icon: '✍️' },
    { value: 'business_protect',   label: "Protecting my business",                   icon: '💼' }
  ],

};

// ══ STATE ════════════════════════════════════════════════════════════════════
var state = { step: 0, answers: {} };

// ══ RENDER ═══════════════════════════════════════════════════════════════════
function render() {
  var q = QUESTIONS[state.step];

  if (q.id === 'priority') {
    var need = state.answers.need || 'general';
    q.options = PRIORITY_OPTIONS[need] || PRIORITY_OPTIONS.general;
  }

  var pct = Math.round(((state.step + 1) / 7) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('step-counter').textContent = (state.step + 1) + ' of 7';
  document.getElementById('back-btn').style.visibility = state.step > 0 ? 'visible' : 'hidden';

  var card = document.getElementById('question-card');

  var html = '<p class="q-number">' + q.number + '</p>';
  html += '<h1 class="q-title">' + q.title + '</h1>';
  html += '<p class="q-sub">' + q.sub + '</p>';

  if (q.type === 'single' || q.type === 'multi') {
    html += '<div class="options">';
    for (var i = 0; i < q.options.length; i++) {
      var opt = q.options[i];
      var sel = q.type === 'multi'
        ? (state.answers[q.id] || []).indexOf(opt.value) > -1
        : state.answers[q.id] === opt.value;
      html += '<button class="opt' + (sel ? ' selected' : '') + '" onclick="selectOption(\'' + q.id + '\',\'' + opt.value + '\',\'' + q.type + '\')">';
      html += '<div class="opt-icon"><span style="font-size:22px;line-height:1">' + opt.icon + '</span></div>';
      html += '<div class="opt-content"><div class="opt-label">' + opt.label + '</div>';
      if (opt.desc) html += '<div class="opt-desc">' + opt.desc + '</div>';
      html += '</div>';
      html += '<div class="opt-check"><div class="opt-check-inner"></div></div>';
      html += '</button>';
    }
    html += '</div>';
    if (q.type === 'multi') html += '<p style="font-size:12px;color:var(--teal-muted);margin-top:12px">Select all that apply</p>';
  }

  if (q.type === 'location') {
    var locVal = state.answers.location || '';
    var remoteOn = state.answers.remote ? ' on' : '';
    html += '<div class="input-wrap">';
    html += '<i class="ti ti-map-pin location-icon"></i>';
    html += '<input type="text" class="location-input" id="location-input" placeholder="Enter your town, city or postcode..." value="' + locVal + '" oninput="state.answers.location=this.value;updateNextBtn()" />';
    html += '</div>';
    html += '<label class="remote-toggle" onclick="toggleRemote()">';
    html += '<div class="toggle-box' + remoteOn + '" id="remote-toggle"><div class="toggle-knob"></div></div>';
    html += '<span>I\'m happy to meet an adviser remotely</span>';
    html += '</label>';
  }

  if (q.type === 'amount') {
    html += '<div class="options" style="gap:8px">';
    for (var j = 0; j < q.options.length; j++) {
      var aopt = q.options[j];
      var asel = state.answers.amount === aopt.value;
      html += '<button class="amount-opt' + (asel ? ' selected' : '') + '" onclick="selectOption(\'amount\',\'' + aopt.value + '\',\'single\')">';
      html += '<div><div class="amount-label">' + aopt.label + '</div><div class="amount-sub">' + aopt.sub + '</div></div>';
      html += '<div class="amount-pip"></div>';
      html += '</button>';
    }
    html += '</div>';
  }

  var isLast = state.step === QUESTIONS.length - 1;
  var btnLabel = isLast ? 'Find my adviser' : 'Continue';
  var disabled = canProceed() ? '' : 'disabled';
  html += '<div class="nav-btns">';
  html += '<button class="btn-prev" onclick="goBack()" ' + (state.step === 0 ? 'style="visibility:hidden"' : '') + '>';
  html += '<i class="ti ti-arrow-left"></i> Back</button>';
  html += '<button class="btn-next" id="next-btn" onclick="nextStep()" ' + disabled + '>';
  html += btnLabel + ' <i class="ti ti-arrow-right"></i></button>';
  html += '</div>';

  card.innerHTML = html;
}

function canProceed() {
  var q = QUESTIONS[state.step];
  if (q.type === 'multi') return (state.answers[q.id] || []).length > 0;
  if (q.type === 'location') return (state.answers.location || '').trim().length > 0 || state.answers.remote;
  return !!state.answers[q.id];
}

function updateNextBtn() {
  var btn = document.getElementById('next-btn');
  if (btn) btn.disabled = !canProceed();
}

function selectOption(id, value, type) {
  if (type === 'multi') {
    var arr = state.answers[id] || [];
    if (value === 'nothing') {
      state.answers[id] = ['nothing'];
    } else {
      var filtered = arr.filter(function(v){ return v !== 'nothing'; });
      var idx = filtered.indexOf(value);
      if (idx > -1) { filtered.splice(idx,1); } else { filtered.push(value); }
      state.answers[id] = filtered;
    }
    render();
  } else {
    state.answers[id] = value;
    render();
    setTimeout(function(){ if(canProceed()) nextStep(); }, 300);
  }
}

function toggleRemote() {
  state.answers.remote = !state.answers.remote;
  var t = document.getElementById('remote-toggle');
  if (t) { if(state.answers.remote){t.classList.add('on');}else{t.classList.remove('on');} }
  updateNextBtn();
}

function nextStep() {
  if (!canProceed()) return;
  if (state.step < QUESTIONS.length - 1) {
    state.step++;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    showMatching();
  }
}

function goBack() {
  if (state.step > 0) {
    state.step--;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

// ══ MATCHING ═════════════════════════════════════════════════════════════════
function showMatching() {
  document.getElementById('questionnaire').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('matching-screen').style.display = 'flex';
  document.getElementById('matching-screen').style.justifyContent = 'center';
  var steps = ['ms1','ms2','ms3','ms4'];
  for (var i=0;i<steps.length;i++) {
    (function(id,delay){
      setTimeout(function(){ document.getElementById(id).classList.add('done'); }, delay);
    })(steps[i], 600 + i*700);
  }
  setTimeout(function(){ showResults(); }, 3800);
}

// ══ AFFILIATE URLS ═══════════════════════════════════════════════════════════
function buildAffiliateUrls() {
  var a = state.answers;
  var location = encodeURIComponent(a.location || 'United Kingdom');
  var remote = a.remote || a.meeting === 'video' || a.meeting === 'phone';
  var adviceMap = {
    retirement:'pensions-retirement', pension:'pensions-retirement',
    invest:'investments', mortgage:'mortgages',
    inheritance:'inheritance', protection:'protection',
    general:'financial-planning'
  };
  var advice = adviceMap[a.need] || 'financial-planning';
  var assetMap = {
    'under50k':'0','50_150k':'50000','150_500k':'150000',
    '500k_1m':'500000','over1m':'1000000','prefer_not':''
  };
  var assets = assetMap[a.amount] || '';
  var meeting = remote ? 'online,telephone' : 'face-to-face,online';
  var UNBIASED_AFF = 'YOUR_UNBIASED_AFFILIATE_ID';
  var VOUCHEDFOR_AFF = 'YOUR_VOUCHEDFOR_AFFILIATE_ID';
  var unbiasedUrl = 'https://www.unbiased.co.uk/find/' + advice + '/advisers?location=' + location + (assets ? '&assets='+assets : '') + '&meeting=' + meeting + '&ref=' + UNBIASED_AFF;
  var vouchedforUrl = 'https://www.vouchedfor.co.uk/find-an-adviser?service=' + advice + '&location=' + location + (assets ? '&assets='+assets : '') + '&ref=' + VOUCHEDFOR_AFF;
  return { unbiasedUrl: unbiasedUrl, vouchedforUrl: vouchedforUrl };
}

// ══ AIRTABLE WRITE ═══════════════════════════════════════════════════════════
function writeToAirtable(affiliateUrl, source) {
  var a = state.answers;
  var lifeEventLabels = {
    retirement_soon:'Approaching retirement', new_family:'New baby or growing family',
    separation:'Separation or divorce', bereavement:'Inherited money or bereavement',
    new_job:'Changed jobs or self-employed', property:'Buying a home',
    nothing:'Nothing specific'
  };
  var lifeEvents = (a.change || []).map(function(v){ return lifeEventLabels[v] || v; });
  try {
    fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        need: a.need || '', priority: a.priority || '',
        feeling: a.feeling || '', change: a.change || [],
        location: a.location || '', remote: !!(a.remote),
        amount: a.amount || '', meeting: a.meeting || '',
        affiliateUrl: affiliateUrl || '', source: source || 'Unbiased'
      })
    }).catch(function(){});
  } catch(e) {}
}

// ══ RESULTS ══════════════════════════════════════════════════════════════════
